<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 520" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <marker id="pa" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#64748b"/></marker>
    <marker id="pb" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#3b82f6"/></marker>
    <marker id="pg" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#22c55e"/></marker>
  </defs>
  <rect width="920" height="520" rx="12" fill="#0f172a"/>
  <text x="460" y="35" text-anchor="middle" fill="#f1f5f9" font-size="18" font-weight="700">Common Agent Design Patterns</text>

  <!-- Pattern 1: ReAct -->
  <rect x="20" y="60" width="275" height="200" rx="10" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="158" y="85" text-anchor="middle" fill="#60a5fa" font-size="15" font-weight="700">1. ReAct Loop</text>
  <text x="158" y="102" text-anchor="middle" fill="#94a3b8" font-size="10">Reason + Act iteratively</text>

  <rect x="40" y="115" width="80" height="30" rx="6" fill="#172554"/><text x="80" y="135" text-anchor="middle" fill="#93c5fd" font-size="10" font-weight="600">Think</text>
  <rect x="40" y="155" width="80" height="30" rx="6" fill="#14532d"/><text x="80" y="175" text-anchor="middle" fill="#86efac" font-size="10" font-weight="600">Act</text>
  <rect x="40" y="195" width="80" height="30" rx="6" fill="#431407"/><text x="80" y="215" text-anchor="middle" fill="#fdba74" font-size="10" font-weight="600">Observe</text>

  <line x1="120" y1="130" x2="120" y2="152" stroke="#64748b" stroke-width="1" marker-end="url(#pa)"/>
  <line x1="120" y1="185" x2="120" y2="192" stroke="#64748b" stroke-width="1" marker-end="url(#pa)"/>
  <path d="M40 210 Q20 170 40 130" fill="none" stroke="#64748b" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#pa)"/>

  <text x="160" y="135" fill="#94a3b8" font-size="9">Thought: I need to search...</text>
  <text x="160" y="175" fill="#94a3b8" font-size="9">Action: search("query")</text>
  <text x="160" y="215" fill="#94a3b8" font-size="9">Observation: found 3 results</text>
  <text x="158" y="248" text-anchor="middle" fill="#475569" font-size="9">LangChain · OpenAI Agents</text>

  <!-- Pattern 2: Multi-Agent -->
  <rect x="315" y="60" width="290" height="200" rx="10" fill="#1e293b" stroke="#22c55e" stroke-width="1.5"/>
  <text x="460" y="85" text-anchor="middle" fill="#86efac" font-size="15" font-weight="700">2. Multi-Agent Collaboration</text>
  <text x="460" y="102" text-anchor="middle" fill="#94a3b8" font-size="10">Specialized agents work together</text>

  <rect x="335" y="115" width="90" height="45" rx="6" fill="#172554" stroke="#3b82f6" stroke-width="1"/>
  <text x="380" y="135" text-anchor="middle" fill="#93c5fd" font-size="10" font-weight="600">Planner</text>
  <text x="380" y="150" text-anchor="middle" fill="#64748b" font-size="8">decompose task</text>

  <rect x="500" y="115" width="90" height="45" rx="6" fill="#14532d" stroke="#22c55e" stroke-width="1"/>
  <text x="545" y="135" text-anchor="middle" fill="#86efac" font-size="10" font-weight="600">Coder</text>
  <text x="545" y="150" text-anchor="middle" fill="#64748b" font-size="8">write code</text>

  <rect x="335" y="180" width="90" height="45" rx="6" fill="#431407" stroke="#f97316" stroke-width="1"/>
  <text x="380" y="200" text-anchor="middle" fill="#fdba74" font-size="10" font-weight="600">Reviewer</text>
  <text x="380" y="215" text-anchor="middle" fill="#64748b" font-size="8">check quality</text>

  <rect x="500" y="180" width="90" height="45" rx="6" fill="#3b0764" stroke="#a855f7" stroke-width="1"/>
  <text x="545" y="200" text-anchor="middle" fill="#d8b4fe" font-size="10" font-weight="600">Executor</text>
  <text x="545" y="215" text-anchor="middle" fill="#64748b" font-size="8">run &amp; test</text>

  <line x1="425" y1="137" x2="497" y2="137" stroke="#64748b" stroke-width="1" marker-end="url(#pa)"/>
  <line x1="545" y1="160" x2="545" y2="177" stroke="#64748b" stroke-width="1" marker-end="url(#pa)"/>
  <line x1="497" y1="202" x2="425" y2="202" stroke="#64748b" stroke-width="1" marker-end="url(#pa)"/>
  <line x1="380" y1="160" x2="380" y2="177" stroke="#64748b" stroke-width="1" marker-end="url(#pa)"/>
  <text x="460" y="248" text-anchor="middle" fill="#475569" font-size="9">CrewAI · AutoGen · LangGraph</text>

  <!-- Pattern 3: Tool-Use -->
  <rect x="625" y="60" width="275" height="200" rx="10" fill="#1e293b" stroke="#a855f7" stroke-width="1.5"/>
  <text x="763" y="85" text-anchor="middle" fill="#c084fc" font-size="15" font-weight="700">3. Tool-Augmented Agent</text>
  <text x="763" y="102" text-anchor="middle" fill="#94a3b8" font-size="10">LLM selects and calls tools</text>

  <rect x="715" y="115" width="95" height="35" rx="6" fill="#172554" stroke="#3b82f6" stroke-width="1"/>
  <text x="763" y="137" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="600">LLM</text>

  <rect x="645" y="175" width="70" height="28" rx="5" fill="#14532d"/>
  <text x="680" y="194" text-anchor="middle" fill="#86efac" font-size="9">calc()</text>
  <rect x="725" y="175" width="70" height="28" rx="5" fill="#14532d"/>
  <text x="760" y="194" text-anchor="middle" fill="#86efac" font-size="9">search()</text>
  <rect x="805" y="175" width="70" height="28" rx="5" fill="#14532d"/>
  <text x="840" y="194" text-anchor="middle" fill="#86efac" font-size="9">code()</text>

  <line x1="740" y1="150" x2="700" y2="172" stroke="#64748b" stroke-width="1" marker-end="url(#pa)"/>
  <line x1="763" y1="150" x2="763" y2="172" stroke="#64748b" stroke-width="1" marker-end="url(#pa)"/>
  <line x1="785" y1="150" x2="825" y2="172" stroke="#64748b" stroke-width="1" marker-end="url(#pa)"/>

  <rect x="695" y="220" width="135" height="25" rx="5" fill="#1e1b4b" stroke="#818cf8" stroke-width="1"/>
  <text x="763" y="237" text-anchor="middle" fill="#a5b4fc" font-size="10">MCP / Function Calling</text>
  <text x="763" y="248" text-anchor="middle" fill="#475569" font-size="9">PydanticAI · OpenAI SDK</text>

  <!-- Pattern 4: Graph-based Workflow -->
  <rect x="20" y="280" width="430" height="220" rx="10" fill="#1e293b" stroke="#06b6d4" stroke-width="1.5"/>
  <text x="235" y="305" text-anchor="middle" fill="#67e8f9" font-size="15" font-weight="700">4. Graph-Based Workflow (LangGraph)</text>
  <text x="235" y="322" text-anchor="middle" fill="#94a3b8" font-size="10">Stateful nodes with conditional edges</text>

  <rect x="55" y="340" width="80" height="35" rx="6" fill="#172554" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="95" y="362" text-anchor="middle" fill="#93c5fd" font-size="10" font-weight="600">START</text>

  <rect x="175" y="340" width="80" height="35" rx="6" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="215" y="362" text-anchor="middle" fill="#86efac" font-size="10" font-weight="600">Agent</text>

  <rect x="175" y="420" width="80" height="35" rx="6" fill="#431407" stroke="#f97316" stroke-width="1.5"/>
  <text x="215" y="442" text-anchor="middle" fill="#fdba74" font-size="10" font-weight="600">Tools</text>

  <rect x="315" y="340" width="100" height="35" rx="6" fill="#3b0764" stroke="#a855f7" stroke-width="1.5"/>
  <text x="365" y="362" text-anchor="middle" fill="#d8b4fe" font-size="10" font-weight="600">Human Review</text>

  <rect x="315" y="420" width="80" height="35" rx="6" fill="#164e63" stroke="#06b6d4" stroke-width="1.5"/>
  <text x="355" y="442" text-anchor="middle" fill="#67e8f9" font-size="10" font-weight="600">END</text>

  <line x1="135" y1="357" x2="172" y2="357" stroke="#64748b" stroke-width="1" marker-end="url(#pa)"/>
  <line x1="255" y1="362" x2="312" y2="357" stroke="#a855f7" stroke-width="1" marker-end="url(#pa)"/>
  <text x="283" y="352" fill="#94a3b8" font-size="8">needs_review?</text>
  <line x1="215" y1="375" x2="215" y2="417" stroke="#22c55e" stroke-width="1" marker-end="url(#pg)"/>
  <text x="228" y="400" fill="#94a3b8" font-size="8">use_tool</text>
  <path d="M175 437 Q140 437 140 385 Q140 357 172 357" fill="none" stroke="#f97316" stroke-width="1" marker-end="url(#pa)"/>
  <text x="118" y="400" fill="#94a3b8" font-size="8">result</text>
  <line x1="365" y1="375" x2="355" y2="417" stroke="#64748b" stroke-width="1" marker-end="url(#pa)"/>
  <text x="235" y="487" text-anchor="middle" fill="#475569" font-size="9">Conditional edges · State persistence · Human-in-the-loop</text>

  <!-- Pattern 5: Handoff -->
  <rect x="470" y="280" width="430" height="220" rx="10" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="685" y="305" text-anchor="middle" fill="#fbbf24" font-size="15" font-weight="700">5. Agent Handoff (OpenAI Agents SDK)</text>
  <text x="685" y="322" text-anchor="middle" fill="#94a3b8" font-size="10">Seamless task delegation between specialized agents</text>

  <rect x="505" y="350" width="110" height="50" rx="8" fill="#172554" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="560" y="372" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="600">Triage Agent</text>
  <text x="560" y="388" text-anchor="middle" fill="#64748b" font-size="9">classify intent</text>

  <rect x="660" y="340" width="110" height="40" rx="6" fill="#14532d" stroke="#22c55e" stroke-width="1"/>
  <text x="715" y="365" text-anchor="middle" fill="#86efac" font-size="10" font-weight="600">Sales Agent</text>

  <rect x="660" y="390" width="110" height="40" rx="6" fill="#431407" stroke="#f97316" stroke-width="1"/>
  <text x="715" y="415" text-anchor="middle" fill="#fdba74" font-size="10" font-weight="600">Support Agent</text>

  <rect x="660" y="440" width="110" height="40" rx="6" fill="#3b0764" stroke="#a855f7" stroke-width="1"/>
  <text x="715" y="465" text-anchor="middle" fill="#d8b4fe" font-size="10" font-weight="600">Tech Agent</text>

  <line x1="615" y1="365" x2="657" y2="360" stroke="#22c55e" stroke-width="1" marker-end="url(#pg)"/>
  <line x1="615" y1="375" x2="657" y2="410" stroke="#f97316" stroke-width="1" marker-end="url(#pa)"/>
  <line x1="615" y1="385" x2="657" y2="460" stroke="#a855f7" stroke-width="1" marker-end="url(#pa)"/>

  <rect x="810" y="370" width="75" height="70" rx="8" fill="#1e293b" stroke="#64748b" stroke-width="1"/>
  <text x="848" y="395" text-anchor="middle" fill="#f8fafc" font-size="10" font-weight="600">Handoff</text>
  <text x="848" y="412" text-anchor="middle" fill="#94a3b8" font-size="8">context</text>
  <text x="848" y="426" text-anchor="middle" fill="#94a3b8" font-size="8">preserved</text>

  <line x1="770" y1="410" x2="807" y2="410" stroke="#64748b" stroke-width="1" marker-end="url(#pa)"/>
  <text x="685" y="497" text-anchor="middle" fill="#475569" font-size="9">Guardrails · Input/Output validation · Context transfer</text>
</svg>